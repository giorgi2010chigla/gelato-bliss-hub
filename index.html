    <meta charset="UTF-8" />

    <meta property="og:title" content="Pasanauri Georgian Restaurant" />

    <script type="module" crossorigin src="./assets/index-l8uKhti5.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CGOn-lhj.css">
    <style>
      html { scroll-behavior: smooth; }
      section[id] { scroll-margin-top: 88px; }
      .menu-food-photo { width: calc(100% + 3rem); height: 190px; margin: -1.5rem -1.5rem 1.25rem; object-fit: cover; border-radius: 0.375rem 0.375rem 0 0; display: block; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script>
      (() => {
        const routeToHash = { home: 'home', food: 'menu', menu: 'menu', reviews: 'reviews', visit: 'visit' };
        const photos = [
          ['khinkali', './assets/khinkali-menu.jpg', 'Khinkali dumplings'],
          ['ხინკალი', './assets/khinkali-menu.jpg', 'ხინკალი'],
          ['khachapuri', './assets/khachapuri-menu.jpg', 'Khachapuri cheese bread'],
          ['ხაჭაპური', './assets/khachapuri-menu.jpg', 'ხაჭაპური'],
          ['shkmeruli', './assets/shkmeruli-menu.jpg', 'Shkmeruli chicken'],
          ['შქმერული', './assets/shkmeruli-menu.jpg', 'შქმერული'],
          ['mushroom', './assets/mushroom-ojakhuri-menu.jpg', 'Mushroom ojakhuri'],
          ['სოკოს', './assets/mushroom-ojakhuri-menu.jpg', 'სოკოს ოჯახური'],
          ['kebab', './assets/kebab-menu.jpg', 'Kebab with smoked sulguni'],
          ['ქაბაბი', './assets/kebab-menu.jpg', 'ქაბაბი შებოლილი სულგუნით'],
          ['eggplant', './assets/eggplant-rolls-menu.jpg', 'Eggplant walnut rolls'],
          ['ბადრიჯანი', './assets/eggplant-rolls-menu.jpg', 'ბადრიჯანი ნიგვზით']
        ];

        function scrollToSection(id) {
          const target = document.getElementById(id);
          if (!target) return false;
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          history.replaceState(null, '', `${location.pathname}${location.search}#${id}`);
          return true;
        }

        document.addEventListener('click', (event) => {
          const link = event.target.closest('a[href]');
          if (!link) return;
          const raw = link.getAttribute('href') || '';
          const url = new URL(raw, location.href);
          const samePage = url.origin === location.origin && url.pathname.replace(/index\.html$/, '') === location.pathname.replace(/index\.html$/, '');
          const pathKey = url.pathname.split('/').filter(Boolean).pop();
          const id = raw.startsWith('#') ? raw.slice(1) : (samePage && url.hash ? url.hash.slice(1) : routeToHash[pathKey]);
          if (id && scrollToSection(id)) event.preventDefault();
        });

        function addMenuPhotos() {
          document.querySelectorAll('#menu article').forEach((card) => {
            if (card.querySelector('.menu-food-photo')) return;
            const text = card.textContent.toLowerCase();
            const photo = photos.find(([key]) => text.includes(key.toLowerCase()));
            if (!photo) return;
            const img = document.createElement('img');
            img.src = photo[1];
            img.alt = photo[2];
            img.loading = 'lazy';
            img.width = 1024;
            img.height = 768;
            img.className = 'menu-food-photo';
            card.prepend(img);
          });
        }

        const observer = new MutationObserver(addMenuPhotos);
        observer.observe(document.documentElement, { childList: true, subtree: true });
        window.addEventListener('load', () => { addMenuPhotos(); if (location.hash) scrollToSection(location.hash.slice(1)); });
      })();
    </script>
  </body>
</html>
