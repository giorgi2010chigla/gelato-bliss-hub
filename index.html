    <script>
      // On refresh / direct deep-link, send the user back to the home page.
      // Runs before the app boots, so refreshing on /food, /visit, etc. won't 404.
      (function () {
        try {
          var basePath = location.pathname.replace(/[^/]+$/, '');
          var rest = location.pathname.slice(basePath.length);
          var isRoot = rest === '' || /^index\.html$/i.test(rest);
          if (!isRoot || location.hash) {
            location.replace(basePath);
          }
        } catch (e) {}
      })();
    </script>

    <style>
      html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
      body { overflow-x: hidden; }
      img, video { max-width: 100%; height: auto; }
      section[id] { scroll-margin-top: 88px; }
      .menu-food-photo { width: calc(100% + 3rem); height: 190px; margin: -1.5rem -1.5rem 1.25rem; object-fit: cover; object-position: center; border-radius: 0.375rem 0.375rem 0 0; display: block; margin-left: auto; margin-right: auto; }

      /* ===== Responsive overrides for phones ===== */
      @media (max-width: 1024px) {
        section[id] { scroll-margin-top: 72px; }
      }

      /* Tablet & small laptop */
      @media (max-width: 900px) {
        .container, [class*="max-w-"] { max-width: 100% !important; }
      }

      /* Phones (≤ 640px) */
      @media (max-width: 640px) {
        section[id] { scroll-margin-top: 64px; }

        /* Tame oversized headings */
        h1 { font-size: clamp(1.9rem, 8vw, 2.6rem) !important; line-height: 1.15 !important; }
        h2 { font-size: clamp(1.5rem, 6.5vw, 2rem) !important; line-height: 1.2 !important; }
        h3 { font-size: clamp(1.15rem, 5vw, 1.5rem) !important; line-height: 1.25 !important; }
        p, li { font-size: clamp(0.95rem, 4vw, 1.05rem) !important; line-height: 1.55 !important; }

        /* Section padding */
        section { padding-left: 1rem !important; padding-right: 1rem !important; }
        section > div { padding-left: 0 !important; padding-right: 0 !important; }

        /* Force any multi-col grids to a single column on phones */
        [class*="grid-cols-2"], [class*="grid-cols-3"], [class*="grid-cols-4"] {
          grid-template-columns: 1fr !important;
        }
        [class*="md:grid-cols"], [class*="lg:grid-cols"] {
          grid-template-columns: 1fr !important;
        }

        /* Hero buttons stack */
        .hero-buttons, [class*="flex-row"]:not(nav):not(header *) {
          flex-wrap: wrap !important;
        }

        /* (hero/banner heights left at original — user wants the original clipping look back) */

        /* Menu card photo: center horizontally on phones */
        .menu-food-photo { height: 160px; width: 100% !important; margin: 0 auto 1rem !important; border-radius: 0.375rem !important; object-position: center center; display: block; }


        /* Header / nav: allow wrapping & smaller links */
        header nav, header > div { flex-wrap: wrap !important; gap: 0.5rem !important; }
        header a, header button { font-size: 0.9rem !important; padding: 0.4rem 0.6rem !important; }

        /* Tables / wide content scroll instead of overflow */
        table { display: block; overflow-x: auto; width: 100%; }
      }

      /* Very small phones (≤ 380px, e.g. iPhone SE 1st gen, Galaxy Fold cover) */
      @media (max-width: 380px) {
        h1 { font-size: 1.7rem !important; }
        h2 { font-size: 1.35rem !important; }
        section { padding-left: 0.75rem !important; padding-right: 0.75rem !important; }
        .menu-food-photo { height: 140px; width: 100% !important; margin: 0 auto 0.85rem !important; }
        header a, header button { font-size: 0.82rem !important; padding: 0.3rem 0.45rem !important; }
      }

      /* Landscape phones – keep hero compact */
      /* (landscape hero override removed — restore original look) */

      /* ===== Decorative Georgian-inspired ornaments ===== */
      .gx-ornament {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        margin: 2.5rem auto;
        max-width: 720px;
        width: 100%;
        opacity: 0.55;
        pointer-events: none;
      }
      .gx-ornament .gx-line {
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, transparent, currentColor 40%, currentColor 60%, transparent);
        color: hsl(var(--primary, 25 60% 45%));
      }
      .gx-ornament svg {
        width: 56px;
        height: 56px;
        color: hsl(var(--primary, 25 60% 45%));
        flex-shrink: 0;
      }
      @media (max-width: 640px) {
        .gx-ornament { margin: 1.75rem auto; gap: 0.75rem; padding: 0 1rem; }
        .gx-ornament svg { width: 40px; height: 40px; }
      }

      /* Subtle corner flourishes inside hero/visit blank space */
      .gx-corner {
        position: absolute;
        width: 120px;
        height: 120px;
        opacity: 0.18;
        pointer-events: none;
        color: hsl(var(--primary, 25 60% 45%));
      }
      .gx-corner.tl { top: 1rem; left: 1rem; }
      .gx-corner.tr { top: 1rem; right: 1rem; transform: scaleX(-1); }
      .gx-corner.bl { bottom: 1rem; left: 1rem; transform: scaleY(-1); }
      .gx-corner.br { bottom: 1rem; right: 1rem; transform: scale(-1, -1); }
      @media (max-width: 640px) {
        .gx-corner { width: 70px; height: 70px; opacity: 0.14; }
      }
    </style>

  <body>
    <div id="root"></div>
    <script>
      (() => {
        const routeToHash = { home: 'home', food: 'menu', menu: 'menu', reviews: 'reviews', visit: 'visit', contact: 'visit' };
        const textToHash = {
          'home': 'home', 'მთავარი': 'home',
          'food': 'menu', 'menu': 'menu', 'საკვები': 'menu', 'მენიუ': 'menu',
          'reviews': 'reviews', 'review': 'reviews', 'შეფასებები': 'reviews',
          'visit': 'visit', 'ვიზიტი': 'visit', 'მოგვინახულეთ': 'visit',
          'contact': 'visit', 'კონტაქტი': 'visit'
        };
        const photos = [
          ['khinkali', './assets/khinkali-menu.jpg', 'Khinkali dumplings'],
          ['ხინკალი', './assets/khinkali-menu.jpg', 'ხინკალი'],
          ['khachapuri', './assets/khachapuri-menu.jpg', 'Khachapuri cheese bread'],
          ['ხაჭაპური', './assets/khachapuri-menu.jpg', 'ხაჭაპური'],
          ['shkmeruli', './assets/shkmeruli-menu.jpg', 'Shkmeruli chicken'],
          ['შქმერული', './assets/shkmeruli-menu.jpg', 'შქმერული'],
          ['mushroom', './assets/mushroom-ojakhuri-menu.jpg', 'Mushroom ojakhuri'],
          ['სოკოს', './assets/mushroom-ojakhuri-menu.jpg', 'სოკოს ოჯახური'],
          ['kebab', './assets/kebab-menu.jpg', 'Kebab with smoked sulguni'],
          ['ქაბაბი', './assets/kebab-menu.jpg', 'ქაბაბი შებოლილი სულგუნით'],
          ['eggplant', './assets/eggplant-rolls-menu.jpg', 'Eggplant walnut rolls'],
          ['ბადრიჯანი', './assets/eggplant-rolls-menu.jpg', 'ბადრიჯანი ნიგვზით']
        ];

        function scrollToSection(id) {
          const target = document.getElementById(id);
          if (!target) return false;
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          history.replaceState(null, '', `${location.pathname}${location.search}#${id}`);
          // Try to close any open mobile menu by clicking a visible close/hamburger button
          setTimeout(() => {
            const opener = document.querySelector('[aria-expanded="true"]');
            if (opener) opener.click();
          }, 50);
          return true;
        }

        function resolveIdFromElement(el) {
          // 1) anchor href
          const link = el.closest('a[href]');
          if (link) {
            const raw = link.getAttribute('href') || '';
            if (raw.startsWith('#')) return raw.slice(1);
            try {
              const url = new URL(raw, location.href);
              if (url.origin === location.origin) {
                if (url.hash) return url.hash.slice(1);
                const pathKey = url.pathname.split('/').filter(Boolean).pop();
                if (pathKey && routeToHash[pathKey.toLowerCase()]) return routeToHash[pathKey.toLowerCase()];
              }
            } catch (_) {}
          }
          // 2) button / menu item — match by visible text
          const btn = el.closest('button, [role="menuitem"], [role="button"], [role="link"]');
          if (btn) {
            const txt = (btn.textContent || '').trim().toLowerCase();
            if (txt && txt.length < 40) {
              for (const key in textToHash) {
                if (txt === key || txt.split(/\s+/).includes(key)) return textToHash[key];
              }
            }
          }
          return null;
        }

        document.addEventListener('click', (event) => {
          const id = resolveIdFromElement(event.target);
          if (!id) return;
          if (scrollToSection(id)) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true); // capture phase so we beat the SPA router

        function addMenuPhotos() {
          document.querySelectorAll('#menu article').forEach((card) => {
            if (card.querySelector('.menu-food-photo')) return;
            const text = card.textContent.toLowerCase();
            const photo = photos.find(([key]) => text.includes(key.toLowerCase()));
            if (!photo) return;
            const img = document.createElement('img');
            img.src = photo[1];
            img.alt = photo[2];
            img.loading = 'lazy';
            img.width = 1024;
            img.height = 768;
            img.className = 'menu-food-photo';
            card.prepend(img);
          });
        }

        // ===== Decorative Georgian-inspired ornaments =====
        const ORNAMENT_SVG = `
<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <g stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="32" cy="32" r="6"/>
    <circle cx="32" cy="32" r="14" stroke-dasharray="2 3"/>
    <path d="M32 4 L36 18 L32 24 L28 18 Z"/>
    <path d="M32 60 L36 46 L32 40 L28 46 Z"/>
    <path d="M4 32 L18 36 L24 32 L18 28 Z"/>
    <path d="M60 32 L46 36 L40 32 L46 28 Z"/>
    <path d="M12 12 L22 22 M52 12 L42 22 M12 52 L22 42 M52 52 L42 42"/>
    <circle cx="32" cy="32" r="1.6" fill="currentColor"/>
  </g>
</svg>`;
        const CORNER_SVG = `
<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="width:100%;height:100%">
  <g stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round">
    <path d="M8 8 L8 60 Q8 80 28 80 L60 80"/>
    <path d="M16 16 L16 52 Q16 72 36 72 L52 72"/>
    <circle cx="8" cy="8" r="3"/>
    <path d="M28 28 Q40 28 40 40 Q40 52 28 52 Q16 52 16 40"/>
    <path d="M60 8 L52 16 M68 8 L52 24 M76 8 L52 32"/>
    <path d="M8 60 L16 52 M8 68 L24 52 M8 76 L32 52"/>
  </g>
</svg>`;

        function makeDivider() {
          const wrap = document.createElement('div');
          wrap.className = 'gx-ornament';
          wrap.setAttribute('aria-hidden', 'true');
          wrap.innerHTML = `<span class="gx-line"></span>${ORNAMENT_SVG}<span class="gx-line"></span>`;
          return wrap;
        }
        function addOrnaments() {
          // Dividers between major sections
          ['menu', 'reviews', 'visit'].forEach((id) => {
            const sec = document.getElementById(id);
            if (!sec || sec.dataset.gxDivider) return;
            const div = makeDivider();
            sec.parentNode.insertBefore(div, sec);
            sec.dataset.gxDivider = '1';
          });
          // Corner flourishes in hero & visit
          ['home', 'visit'].forEach((id) => {
            const sec = document.getElementById(id);
            if (!sec || sec.dataset.gxCorners) return;
            const cs = getComputedStyle(sec);
            if (cs.position === 'static') sec.style.position = 'relative';
            ['tl', 'tr', 'bl', 'br'].forEach((pos) => {
              const c = document.createElement('div');
              c.className = `gx-corner ${pos}`;
              c.setAttribute('aria-hidden', 'true');
              c.innerHTML = CORNER_SVG;
              sec.appendChild(c);
            });
            sec.dataset.gxCorners = '1';
          });
        }

        const observer = new MutationObserver(() => { addMenuPhotos(); addOrnaments(); });
        observer.observe(document.documentElement, { childList: true, subtree: true });
        window.addEventListener('load', () => { addMenuPhotos(); addOrnaments(); if (location.hash) scrollToSection(location.hash.slice(1)); });
      })();
    </script>
  </body>
